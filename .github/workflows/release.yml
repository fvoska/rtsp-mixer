name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-android:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/release.jks

      - name: Write key.properties
        env:
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${KS_PASS}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASS}
          EOF

      - name: Build signed APK
        run: |
          flutter build apk --release \
            --build-name=${{ needs.release-please.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Rename artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             rtsp-mixer-${{ needs.release-please.outputs.version }}-android.apk

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "rtsp-mixer-${{ needs.release-please.outputs.version }}-android.apk" \
            --clobber

  build-macos:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS app
        run: |
          flutter build macos --release \
            --build-name=${{ needs.release-please.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/rtsp_mixer.app"
          DMG_NAME="rtsp-mixer-${{ needs.release-please.outputs.version }}-macos.dmg"
          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "RTSP Mixer" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "rtsp-mixer-${{ needs.release-please.outputs.version }}-macos.dmg" \
            --clobber

  build-windows:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows app
        run: |
          flutter build windows --release `
            --build-name=${{ needs.release-please.outputs.version }} `
            --build-number=${{ github.run_number }}

      - name: Build Inno Setup installer
        run: |
          $iscc = Get-ChildItem -Path "C:\Program Files*\Inno Setup*" -Filter "ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found on runner" }
          & $iscc.FullName "/DAppVersion=${{ needs.release-please.outputs.version }}" windows\installer.iss

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" `
            "build\windows\installer\rtsp-mixer-${{ needs.release-please.outputs.version }}-windows-setup.exe" `
            --clobber

  publish:
    needs: [release-please, build-android, build-macos, build-windows]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
