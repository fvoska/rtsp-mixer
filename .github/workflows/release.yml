name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-android:
    needs: release-please
    # Build on a real release (release-please cut a tag) OR on a manual
    # workflow_dispatch run. Manual runs let us produce a testable APK from
    # any branch without waiting for a release to be created.
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Resolve build version
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # On a release run this is the release-please version; on a manual
          # dispatch (no release) it is empty, so fall back to a dev version
          # tagged with the run number for traceability.
          VERSION="${RELEASE_VERSION:-0.0.0-dev}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is empty or not set."
            exit 1
          fi

          # Decode the base64 secret into the keystore. --decode ignores
          # whitespace/newlines that GitHub may introduce in the secret value.
          printf '%s' "$KEYSTORE_B64" | base64 --decode > android/app/release.jks

          # Fail fast with a clear message if the decoded file is not a real
          # keystore. Without this, an invalid keystore only surfaces ~9 min
          # later as a cryptic "Tag number over 30 is not supported" during
          # :app:packageRelease. A common cause is a double base64-encoded
          # secret: `printf '%s' "$B64" | base64 --decode` still leaves base64
          # *text* in the file, which keytool cannot parse.
          if ! keytool -list \
                 -keystore android/app/release.jks \
                 -storepass "$KS_PASS" >/dev/null 2>keytool-err.log; then
            echo "::error::release.jks is not a readable keystore. The ANDROID_KEYSTORE_BASE64 secret is likely corrupt, double base64-encoded, or the store password is wrong."
            echo "Regenerate the secret with a SINGLE base64 pass over the .jks, e.g.:"
            echo "  base64 -w0 upload-keystore.jks | gh secret set ANDROID_KEYSTORE_BASE64"
            echo "keytool output:"
            cat keytool-err.log
            exit 1
          fi

          echo "Keystore decoded and verified."

      - name: Write key.properties
        env:
          KS_PASS:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${KS_PASS}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASS}
          EOF

      - name: Build signed APK
        run: |
          flutter build apk --release \
            --build-name="$APP_VERSION" \
            --build-number=${{ github.run_number }}

      - name: Rename artifact
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "rtsp-mixer-$APP_VERSION-android.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-mixer-${{ env.APP_VERSION }}-android
          path: rtsp-mixer-${{ env.APP_VERSION }}-android.apk
          if-no-files-found: error

      - name: Upload to release
        # Only when release-please actually cut a release; a manual dispatch
        # has no tag to upload against.
        if: needs.release-please.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "rtsp-mixer-$APP_VERSION-android.apk" \
            --clobber

  build-macos:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build macOS app
        run: |
          flutter build macos --release \
            --build-name=${{ needs.release-please.outputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/rtsp_mixer.app"
          DMG_NAME="rtsp-mixer-${{ needs.release-please.outputs.version }}-macos.dmg"
          STAGING="dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "RTSP Mixer" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "rtsp-mixer-${{ needs.release-please.outputs.version }}-macos.dmg" \
            --clobber

  build-windows:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows app
        run: |
          flutter build windows --release `
            --build-name=${{ needs.release-please.outputs.version }} `
            --build-number=${{ github.run_number }}

      - name: Build Inno Setup installer
        run: |
          $iscc = Get-ChildItem -Path "C:\Program Files*\Inno Setup*" -Filter "ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found on runner" }
          & $iscc.FullName "/DAppVersion=${{ needs.release-please.outputs.version }}" windows\installer.iss

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" `
            "build\windows\installer\rtsp-mixer-${{ needs.release-please.outputs.version }}-windows-setup.exe" `
            --clobber

  publish:
    needs: [release-please, build-android, build-macos, build-windows]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
